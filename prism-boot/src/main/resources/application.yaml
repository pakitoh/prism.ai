server:
  port: 8087

spring:
  application:
    name: prism-ai

  datasource:
    url: ${PRISM_DB_URL:jdbc:postgresql://localhost:5432/prism_db}
    username: ${PRISM_DB_USER:postgres}
    password: ${PRISM_DB_PASSWORD:postgres}
    # Schema is created by the Postgres container's docker-entrypoint-initdb.d
    # (scripts/prism-db-init.sql), not by the app — so no spring.sql.init here.

  ai:
    model:
      chat: google-genai
      # embedding.text defaults to google-genai (the only embedding model on the
      # classpath, from spring-ai-starter-model-google-genai-embedding). Set to 'none'
      # to disable when running store=memory without a key (see prism.knowledge below).
    google:
      genai:
        # Free Gemini Developer API key from https://aistudio.google.com/apikey.
        # NOTE: chat and embedding are DIFFERENT connection prefixes — each needs its
        # own api-key; the embedding connection does not inherit the chat one. Without
        # it the embedding autoconfig falls back to Vertex AI mode and demands a project-id.
        api-key: ${GEMINI_API_KEY:}
        embedding:
          api-key: ${GEMINI_API_KEY:}        # spring.ai.google.genai.embedding (connection)
          text:
            options:
              model: ${PRISM_EMBEDDING_MODEL:gemini-embedding-2}
    chat:
      observations:
        log-prompt: true       # logs the full assembled prompt (messages)
        log-completion: true   # logs the model's completion
    mcp:
      server:
        # Exposes the investigation tools over Streamable HTTP at /mcp. `protocol` MUST be
        # set explicitly: the transport autoconfig gates on @ConditionalOnProperty(protocol=
        # STREAMABLE, matchIfMissing=false), so the property default alone doesn't activate it.
        # Tools come from the ToolCallbackProvider bean (McpConfiguration).
        protocol: STREAMABLE
        name: prism
        version: 0.1.0
        instructions: >
          prism.ai investigates production observability incidents over Prometheus,
          Loki and Tempo. Use 'investigate' to start one (it returns an id), then poll
          'get_investigation'; use 'list_recent_investigations' to spot recurring patterns.

prism:
  mcp:
    # When set, the MCP endpoint (/mcp) requires a matching X-API-Key header; blank = open (dev).
    api-key: ${PRISM_MCP_API_KEY:secret}
  knowledge:
    # 'pgvector' = semantic recall via the native Gemini EmbeddingModel + pgvector;
    # 'memory' = in-process token-overlap (no DB/embeddings, good for local dev — set
    # spring.ai.model.embedding.text=none if running it without a GEMINI_API_KEY).
    store: ${PRISM_KNOWLEDGE_STORE:pgvector}
  reasoning:
    # Two-tier retry: the HTTP client retries transient errors (429, 5xx) up to 2 times
    # on the same model before raising. RetryingReasoningPort then rotates to the next
    # model for up to max-attempts total reasoning attempts. One reasoning attempt may
    # therefore represent up to 3 HTTP calls, so the worst-case total is max-attempts * 3.
    max-attempts: ${PRISM_MAX_ATTEMPTS:24}
    # Ordered list — first entry is tried first. Entries with only 'id' use the
    # auto-configured ChatModel (Spring AI starter). Entries with 'base-url' and 'api-key'
    # target that OpenAI-compatible endpoint; both fields are required or startup fails.
    # NOTE: gemini-2.5-pro is NOT on the free tier (quota 0) — needs a billing-enabled key.
    models:
    - id: llama-3.3-70b-versatile
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai/v1
    - id: qwen/qwen3-32b
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai/v1
    - id: openai/gpt-oss-120b
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai/v1
    - id: gemini-3.5-flash
      api-key: ${GEMINI_API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
    - id: gemini-3.1-flash-lite
      api-key: ${GEMINI_API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
    - id: gemma-4-31b-it
      api-key: ${GEMINI_API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
  telemetry:
    prometheus-url: ${PRISM_PROMETHEUS_URL:http://localhost:9090}
    loki-url: ${PRISM_LOKI_URL:http://localhost:3100}
    tempo-url: ${PRISM_TEMPO_URL:http://localhost:3200}
  grafana:
    # Base URL of the Grafana that investigation results deep-link into, plus the
    # datasource UIDs to target (must match the UIDs of the provisioned Grafana
    # datasources). A blank uid disables links for that source. No network call is
    # made — these only build /explore URLs.
    url: ${PRISM_GRAFANA_URL:http://localhost:3000}
    prometheus-uid: ${PRISM_PROMETHEUS_UID:prometheus}
    loki-uid: ${PRISM_LOKI_UID:loki}
    tempo-uid: ${PRISM_TEMPO_UID:tempo}
  investigation:
    max-steps: ${PRISM_MAX_STEPS:128}

logging:
  level:
    ai.prism.adapters.out.reasoning.SpringAiReasoningAdapter: DEBUG
    # add TRACE here instead if you also want the system prompt

    ai.prism.adapters.out: DEBUG
    # or narrow it, e.g. ai.prism.adapters.out.investigation: DEBUG
    # add TRACE on ai.prism.adapters.out.http.ObservedHttpExecutor for full (untruncated) telemetry bodies