spring:
  application:
    name: prism-ai

  datasource:
    url: ${PRISM_DB_URL:jdbc:postgresql://localhost:5432/prism_db}
    username: ${PRISM_DB_USER:postgres}
    password: ${PRISM_DB_PASSWORD:postgres}

  sql:
    init:
      mode: always
      schema-locations: classpath:db/investigations-schema.sql,classpath:db/knowledge-schema.sql

  ai:
    model:
      chat: google-genai
    google:
      genai:
        # Free Gemini Developer API key from https://aistudio.google.com/apikey
        api-key: ${GEMINI_API_KEY:}

prism:
  knowledge:
    # 'pgvector' = semantic recall via Gemini embeddings + pgvector;
    # 'memory' = in-process token-overlap (no DB/embeddings, good for local dev).
    store: ${PRISM_KNOWLEDGE_STORE:pgvector}
  embedding:
    # Spring AI 1.1.7 has no native Gemini embedding model, so we use Gemini's
    # OpenAI-compatible endpoint with the same GEMINI_API_KEY.
    api-key: ${GEMINI_API_KEY:}
    model: ${PRISM_EMBEDDING_MODEL:text-embedding-004}
    base-url: ${PRISM_EMBEDDING_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
  reasoning:
    # Each reasoning step retries up to max-attempts, rotating to the next model on error.
    # Defaults to the number of models when unset.
    max-attempts: ${PRISM_MAX_ATTEMPTS:4}
    # Ordered list — first entry is tried first. Entries with only 'id' use the
    # auto-configured ChatModel (Spring AI starter). Entries with 'base-url' and 'api-key'
    # target that OpenAI-compatible endpoint; both fields are required or startup fails.
    # NOTE: gemini-2.5-pro is NOT on the free tier (quota 0) — needs a billing-enabled key.
    models:
      - id: ${PRISM_MODEL:gemini-2.5-flash}
      - id: gemini-2.0-flash
      # Example: add an OpenAI-compatible provider (e.g. Groq) as a further fallback:
      # - id: llama-3.3-70b-versatile
      #   api-key: ${GROQ_API_KEY}
      #   base-url: https://api.groq.com/openai
  telemetry:
    prometheus-url: ${PRISM_PROMETHEUS_URL:http://localhost:9090}
    loki-url: ${PRISM_LOKI_URL:http://localhost:3100}
    # NOTE: docker-compose does not publish Tempo's 3200 to the host yet — run
    # the app inside the prism-net network, or add a host port mapping for Tempo.
    tempo-url: ${PRISM_TEMPO_URL:http://localhost:3200}
  investigation:
    max-steps: ${PRISM_MAX_STEPS:12}

# Observability: export metrics, traces and logs via OTLP to the collector
# (http://localhost:4318 from the host; otel-collector:4318 inside prism-net).
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: ${PRISM_TRACE_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${PRISM_OTLP_HTTP:http://localhost:4318}/v1/traces
    metrics:
      export:
        url: ${PRISM_OTLP_HTTP:http://localhost:4318}/v1/metrics
        step: 10s
        # Micrometer's OTLP registry is separate from the trace/log resource,
        # so set service.name explicitly to keep all three consistent.
        resource-attributes:
          service.name: ${spring.application.name}
    logging:
      endpoint: ${PRISM_OTLP_HTTP:http://localhost:4318}/v1/logs
