spring:
  application:
    name: prism-ai

  datasource:
    url: ${PRISM_DB_URL:jdbc:postgresql://localhost:5432/prism_db}
    username: ${PRISM_DB_USER:postgres}
    password: ${PRISM_DB_PASSWORD:postgres}

  sql:
    init:
      mode: always
      schema-locations: classpath:db/investigations-schema.sql

  ai:
    model:
      chat: google-genai
    google:
      genai:
        # Free Gemini Developer API key from https://aistudio.google.com/apikey
        api-key: ${GEMINI_API_KEY:}

prism:
  reasoning:
    # 'fallback' tries each model in order on failure. ('race' is a future strategy.)
    strategy: fallback
    models:
      - ${PRISM_MODEL:gemini-2.5-pro}   # primary
      - gemini-2.5-flash                # fallback
  telemetry:
    prometheus-url: ${PRISM_PROMETHEUS_URL:http://localhost:9090}
    loki-url: ${PRISM_LOKI_URL:http://localhost:3100}
    # NOTE: docker-compose does not publish Tempo's 3200 to the host yet — run
    # the app inside the prism-net network, or add a host port mapping for Tempo.
    tempo-url: ${PRISM_TEMPO_URL:http://localhost:3200}
  investigation:
    max-steps: ${PRISM_MAX_STEPS:12}

# Observability: export metrics, traces and logs via OTLP to the collector
# (http://localhost:4318 from the host; otel-collector:4318 inside prism-net).
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: ${PRISM_TRACE_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${PRISM_OTLP_HTTP:http://localhost:4318}/v1/traces
    metrics:
      export:
        url: ${PRISM_OTLP_HTTP:http://localhost:4318}/v1/metrics
        step: 10s
        # Micrometer's OTLP registry is separate from the trace/log resource,
        # so set service.name explicitly to keep all three consistent.
        resource-attributes:
          service.name: ${spring.application.name}
    logging:
      endpoint: ${PRISM_OTLP_HTTP:http://localhost:4318}/v1/logs
