receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        # Expose incoming request headers as client metadata so the Langfuse pipeline can read
        # each service's forwarded credential (batch/langfuse + headers_setter, below).
        include_metadata: true
      http:
        endpoint: 0.0.0.0:4318
        include_metadata: true

processors:
  batch:
  # Langfuse should only see GenAI/agent spans, not the whole trace firehose. Keep spans whose
  # instrumentation scope starts with `ai.` (custom tracers) and drop auto-instrumentation
  # (io.opentelemetry.* HTTP/JDBC, etc.). Project-agnostic: any service that names its agent
  # tracers `ai.<project>.*` is covered by the same shared collector — e.g. a project named
  # `foo` uses `ai.foo.*`.
  # (A filter condition drops the span when it evaluates true, hence the negation.)
  filter/langfuse:
    error_mode: ignore
    traces:
      span:
        - 'not IsMatch(instrumentation_scope.name, "^ai[.]")'
  # Per-tenant batching: one batch bucket per distinct forwarded Langfuse credential, so each
  # service's `langfuse-authorization` metadata survives batching and reaches headers_setter.
  # A plain `batch` would merge tenants into one outgoing request and lose the per-request header.
  batch/langfuse:
    metadata_keys: [langfuse-authorization]
    metadata_cardinality_limit: 100

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
  otlphttp:
    endpoint: http://loki:3100/otlp
  otlp:
    endpoint: tempo:4317
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
    sending_queue:
      enabled: true
  # Agent-trace ingestion: run traces also go to Langfuse, where each `ai.*` LLM-call span
  # (GenAI attrs + token usage) becomes a costed "generation".
  # Auth is set per request by the headers_setter extension from the credential each service
  # forwards (so it lands in its own project); a service that sends none is not exported.
  # Single endpoint for all tenants; use the US host if your project is in the US region.
  otlphttp/langfuse:
    endpoint: https://cloud.langfuse.com/api/public/otel
    auth:
      authenticator: headers_setter
  debug:
    verbosity: detailed

connectors:
  spanmetrics:
    dimensions:
      - name: http.method
        default: GET
      - name: http.status_code
      - name: http.route
    exclude_dimensions:
      - status.code
    metrics_flush_interval: 5s
    histogram:
      disable: false

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  # Forwards each service's own Langfuse credential to the exporter. A service sends its key as
  # the `langfuse-authorization` OTLP header (OTEL_EXPORTER_OTLP_HEADERS) and lands in its own
  # Langfuse project; the collector holds no credentials. A service that sends no such header has
  # no Authorization set, so its spans are simply not accepted by Langfuse.
  headers_setter:
    headers:
      - action: upsert
        key: Authorization
        from_context: langfuse-authorization

service:
  extensions: [health_check, headers_setter]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp, spanmetrics]
    # Same spans, but filtered to just the `ai.*` agent/GenAI spans and batched per-tenant
    # (by forwarded credential) before Langfuse.
    traces/langfuse:
      receivers: [otlp]
      processors: [filter/langfuse, batch/langfuse]
      exporters: [otlphttp/langfuse]
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [batch]
      exporters: [prometheus]