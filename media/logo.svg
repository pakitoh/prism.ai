<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230" width="640" height="230">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="bg" cx="35%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#172032"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>

    <linearGradient id="prism-ab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="prism-ac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="prism-front" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.01"/>
    </linearGradient>

    <radialGradient id="crystal-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="230" fill="url(#bg)" rx="12"/>

  <!-- Subtle crystal ambient glow -->
  <ellipse cx="145" cy="112" rx="135" ry="105" fill="url(#crystal-glow)"/>

  <!--
    All prism elements use original 600x500 coordinates from the base design.
    Transform maps them to this 640x230 canvas:
      x_new = 0.78 * x_orig - 87
      y_new = 0.78 * y_orig - 80
    Key original points:
      A(220,120) → (85,14)   top apex
      B(150,300) → (30,154)  front bottom-left
      C(270,330) → (124,177) front bottom-right
      D(370,160) → (201,45)  back top apex
      F(420,370) → (241,209) back bottom-right
  -->
  <g transform="matrix(0.78, 0, 0, 0.78, -87, -80)">

    <!-- Hidden (back) dashed edges -->
    <line x1="370" y1="160" x2="300" y2="340" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3"/>
    <line x1="300" y1="340" x2="420" y2="370" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3"/>
    <line x1="150" y1="300" x2="300" y2="340" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3"/>

    <!-- Glass faces -->
    <!-- Left rectangular face (AB-ED): light enters here -->
    <polygon points="220,120 150,300 300,340 370,160" fill="url(#prism-ab)"/>
    <!-- Right rectangular face (AC-FD): spectrum exits here -->
    <polygon points="220,120 270,330 420,370 370,160" fill="url(#prism-ac)"/>
    <!-- Front triangular face (ABC) -->
    <polygon points="220,120 150,300 270,330" fill="url(#prism-front)"/>

    <!-- Neural network pattern on glass — the AI component -->
    <g stroke="#94A3B8" stroke-width="1.2" opacity="0.38">
      <line x1="200" y1="200" x2="180" y2="270"/>
      <line x1="200" y1="200" x2="230" y2="240"/>
      <line x1="180" y1="270" x2="230" y2="240"/>
      <line x1="230" y1="240" x2="240" y2="300"/>
      <line x1="180" y1="270" x2="240" y2="300"/>
      <line x1="200" y1="200" x2="290" y2="220"/>
      <line x1="290" y1="220" x2="270" y2="280"/>
      <line x1="230" y1="240" x2="270" y2="280"/>
      <line x1="290" y1="220" x2="330" y2="190"/>
      <line x1="270" y1="280" x2="310" y2="310"/>
      <line x1="310" y1="310" x2="330" y2="190"/>
      <line x1="330" y1="190" x2="380" y2="240"/>
      <line x1="380" y1="240" x2="340" y2="320"/>
      <line x1="310" y1="310" x2="340" y2="320"/>
    </g>
    <g fill="#38BDF8" filter="url(#softglow)" opacity="0.75">
      <circle cx="200" cy="200" r="4"/>
      <circle cx="180" cy="270" r="3.5"/>
      <circle cx="230" cy="240" r="4.5"/>
      <circle cx="240" cy="300" r="3"/>
      <circle cx="290" cy="220" r="4"/>
      <circle cx="270" cy="280" r="3.5"/>
      <circle cx="310" cy="310" r="4"/>
      <circle cx="330" cy="190" r="4.5"/>
      <circle cx="380" cy="240" r="3.5"/>
      <circle cx="340" cy="320" r="4"/>
    </g>

    <!-- Incoming single white beam (raw telemetry) -->
    <path d="M 40,215 L 220,215" fill="none" stroke="#FFFFFF" stroke-width="5"
          stroke-linecap="round" filter="url(#glow)" opacity="0.88"/>

    <!-- Internal refraction — beam splits inside the crystal -->
    <line x1="220" y1="215" x2="328" y2="198" stroke="#F87171" stroke-width="2.5" opacity="0.65"/>
    <line x1="220" y1="215" x2="342" y2="218" stroke="#FBBF24" stroke-width="2.5" opacity="0.65"/>
    <line x1="220" y1="215" x2="357" y2="238" stroke="#34D399" stroke-width="2.5" opacity="0.65"/>
    <line x1="220" y1="215" x2="371" y2="258" stroke="#60A5FA" stroke-width="2.5" opacity="0.65"/>
    <line x1="220" y1="215" x2="390" y2="280" stroke="#C084FC" stroke-width="2.5" opacity="0.65"/>

    <!-- Outgoing spectrum (5 signals: metrics, logs, traces, spans, profiles) -->
    <path d="M 328,198 L 505,177" fill="none" stroke="#F87171" stroke-width="5"
          stroke-linecap="round" filter="url(#glow)"/>
    <path d="M 342,218 L 505,221" fill="none" stroke="#FBBF24" stroke-width="5"
          stroke-linecap="round" filter="url(#glow)"/>
    <path d="M 357,238 L 505,265" fill="none" stroke="#34D399" stroke-width="5"
          stroke-linecap="round" filter="url(#glow)"/>
    <path d="M 371,258 L 505,309" fill="none" stroke="#60A5FA" stroke-width="5"
          stroke-linecap="round" filter="url(#glow)"/>
    <path d="M 390,280 L 505,350" fill="none" stroke="#C084FC" stroke-width="5"
          stroke-linecap="round" filter="url(#glow)"/>

    <!-- Front crystal edges (bright, clean lines) -->
    <line x1="220" y1="120" x2="150" y2="300" stroke="#CBD5E1" stroke-width="3.5" stroke-linejoin="round"/>
    <line x1="150" y1="300" x2="270" y2="330" stroke="#CBD5E1" stroke-width="3.5" stroke-linejoin="round"/>
    <line x1="220" y1="120" x2="270" y2="330" stroke="#CBD5E1" stroke-width="3.5" stroke-linejoin="round"/>
    <line x1="220" y1="120" x2="370" y2="160" stroke="#CBD5E1" stroke-width="3.5" stroke-linejoin="round"/>
    <line x1="270" y1="330" x2="420" y2="370" stroke="#CBD5E1" stroke-width="3.5" stroke-linejoin="round"/>
    <line x1="370" y1="160" x2="420" y2="370" stroke="#CBD5E1" stroke-width="3.5" stroke-linejoin="round"/>

    <!-- Apex highlight dot -->
    <circle cx="220" cy="120" r="4" fill="white" opacity="0.6" filter="url(#softglow)"/>
  </g>

  <!-- Wordmark — horizontally centered in right half of canvas -->
  <text x="472" y="122"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="44"
        font-weight="200"
        letter-spacing="3"
        text-anchor="middle">
    <tspan fill="#FFFFFF">prism</tspan><tspan fill="#38BDF8" font-weight="500">.ai</tspan>
  </text>

  <!-- Tagline -->
  <text x="472" y="152"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="12"
        font-weight="300"
        letter-spacing="4"
        text-anchor="middle"
        fill="#64748B">
    OBSERVABILITY INTELLIGENCE
  </text>
</svg>
