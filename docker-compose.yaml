networks:
  prism-net:
    driver: bridge

services:

  # Database with Vector Support
  postgres:
    image: ankane/pgvector:latest
    container_name: prism_pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: prism_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./scripts/prism-db-init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prism_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prism-net

  # Application services — opt-in via: docker compose --profile app up
